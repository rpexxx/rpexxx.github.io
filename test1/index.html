<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
</head>
<body>
    <script>
        // ====== ЗДЕСЬ ТВОЯ ССЫЛКА (только одну поменяй) ======
        const TARGET_URL = "https://onlyfans.com/ellablonde/c300";
        // ===================================================

        const ua = navigator.userAgent;
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);

        if (isAndroid) {
            // Android: intent для Chrome
            const cleanUrl = TARGET_URL.replace(/^https?:\/\//, '');
            const intentUrl = `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end`;
            window.location.href = intentUrl;
            // фолбек через 800ms
            setTimeout(function() {
                window.location.href = TARGET_URL;
            }, 800);
        } 
        else if (isIOS) {
            // iOS: пытаемся открыть в Safari через window.open
            // Сработает, если открыто не из Twitter (там блокируют)
            var a = document.createElement('a');
            a.href = TARGET_URL;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            // фолбек
            setTimeout(function() {
                window.location.href = TARGET_URL;
            }, 500);
        }
        else {
            // Desktop и всё остальное
            window.location.href = TARGET_URL;
        }
    </script>
    <p>Перенаправление...</p>
</body>
</html>
