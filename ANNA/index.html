<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Age Verification - Bot Landing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffb6c1; /* розовый фон */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 40px 30px 50px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.4);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff0000; /* красный текст */
            margin-bottom: 20px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .question {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ff0000;
            margin: 30px 0 40px;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            background-color: #20b2aa; /* бирюзовый */
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 60px;
            text-decoration: none;
            transition: transform 0.2s ease, background-color 0.2s;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border: none;
            cursor: pointer;
            text-align: center;
            min-width: 130px;
        }

        .btn:hover {
            transform: scale(1.03);
            background-color: #1e9e96;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #ff4d4d;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px 40px;
            }
            .question {
                font-size: 1.5rem;
            }
            .btn {
                font-size: 1.2rem;
                padding: 12px 24px;
                min-width: 110px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨✨</h1>
        <div class="question">
            Are you 18 or older?
        </div>
        <div class="buttons">
            <!-- ЗАМЕНИ ССЫЛКИ НА ТВОИ -->
            <a href="https://onenightchick.com/?utm_source=ak5Udq5tP7YCo&utm_campaign=IN1" class="btn">✅ YES</a>
            <a href="https://onenightchick.com/?utm_source=ak5Udq5tP7YCo&utm_campaign=IN2" class="btn">❌ NO</a>
        </div>
        <div class="footer">
           💋
        </div>
    </div>
</body>
</html>
